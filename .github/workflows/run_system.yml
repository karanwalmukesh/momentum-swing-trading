name: Momentum Swing Trading System - Full Universe Scanner

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 4:30 PM IST Monday-Friday
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  run-trading-system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify CSV File
        run: |
          if [ -f "NSE_Sector_Master.csv" ]; then
            echo "✅ CSV file found: NSE_Sector_Master.csv"
            echo "📊 CSV Preview:"
            head -n 5 NSE_Sector_Master.csv
          else
            echo "⚠️ NSE_Sector_Master.csv not found. System will create sample universe."
          fi
      
      - name: Create Data Directory
        run: |
          mkdir -p data
          if [ ! -f data/portfolio_state.json ]; then
            echo '{"available_cash": 500000, "total_equity": 500000, "active_positions": [], "historical_trades": [], "system_signals_log": [], "user_execution_log": [], "last_update": null}' > data/portfolio_state.json
          fi
      
      - name: Run Trading System (Full Universe)
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python src/main.py
      
      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git pull origin main --rebase --autostash || true
          
          if [[ -n $(git status -s) ]]; then
            git add data/portfolio_state.json README.md
            git commit -m "Auto-update: Full universe scan $(date -u '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-system-outputs
          path: |
            data/portfolio_state.json
            README.md
            NSE_Sector_Master.csv
